<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="financeGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#financeGlow)">
    <text x="40" y="50" font-size="48" font-weight="bold" fill="white" opacity="0.1" text-anchor="middle">$</text>

    <path d="M25 55 L40 30 L55 45" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round" style="animation: financePulse 1.6s ease-in-out infinite"/>
    <polygon points="55,45 60,40 55,42" fill="white" opacity="0.9"/>

    <circle cx="20" cy="65" r="6" fill="white" opacity="0.85" style="animation: financeBounce 1.2s ease-in-out infinite; animation-delay: 0s; transform-box: fill-box; transform-origin: center"/>
    <text x="20" y="68" font-size="8" fill="white" text-anchor="middle" font-weight="bold" opacity="0.7">$</text>

    <circle cx="35" cy="70" r="6" fill="white" opacity="0.75" style="animation: financeBounce 1.2s ease-in-out infinite; animation-delay: 0.2s; transform-box: fill-box; transform-origin: center"/>
    <text x="35" y="73" font-size="8" fill="white" text-anchor="middle" font-weight="bold" opacity="0.6">$</text>

    <circle cx="50" cy="68" r="6" fill="white" opacity="0.8" style="animation: financeBounce 1.2s ease-in-out infinite; animation-delay: 0.4s; transform-box: fill-box; transform-origin: center"/>
    <text x="50" y="71" font-size="8" fill="white" text-anchor="middle" font-weight="bold" opacity="0.65">$</text>

    <rect x="15" y="50" width="5" height="8" rx="1" fill="white" opacity="0.6" style="animation: financePulse 1.4s ease-in-out infinite"/>
    <rect x="25" y="45" width="5" height="13" rx="1" fill="white" opacity="0.75" style="animation: financePulse 1.4s ease-in-out infinite; animation-delay: 0.1s"/>
    <rect x="35" y="38" width="5" height="20" rx="1" fill="white" opacity="0.9" style="animation: financePulse 1.4s ease-in-out infinite; animation-delay: 0.2s"/>

    <g opacity="0.6" style="animation: financeBounce 1.2s ease-in-out infinite; animation-delay: 0.3s; transform-box: fill-box; transform-origin: center">
      <line x1="60" y1="15" x2="70" y2="15" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <line x1="65" y1="10" x2="65" y2="20" stroke="white" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <style>
    @keyframes financePulse {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 1; }
    }
    @keyframes financeBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2.5px); }
    }
  </style>
</svg>
