<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="agileGlow"><feGaussianBlur stdDeviation="8" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g filter="url(#agileGlow)">
    <g style="animation: slideDown 2s ease-in-out infinite">
      <rect x="60" y="75" width="70" height="250" rx="10" fill="none" stroke="white" stroke-width="10" opacity="0.8"/>
      <rect x="60" y="90" width="70" height="50" fill="white" opacity="0.7" style="animation: pulse 1.5s ease-in-out infinite"/>
      <rect x="60" y="150" width="70" height="50" fill="white" opacity="0.6" style="animation: pulse 1.5s ease-in-out infinite 0.3s"/>
      <rect x="60" y="210" width="70" height="50" fill="white" opacity="0.5" style="animation: pulse 1.5s ease-in-out infinite 0.6s"/>
    </g>
    <g style="animation: slideDown 2s ease-in-out infinite 0.2s">
      <rect x="165" y="75" width="70" height="250" rx="10" fill="none" stroke="white" stroke-width="10" opacity="0.8"/>
      <rect x="165" y="90" width="70" height="50" fill="white" opacity="0.65" style="animation: pulse 1.5s ease-in-out infinite 0.1s"/>
      <rect x="165" y="150" width="70" height="50" fill="white" opacity="0.55" style="animation: pulse 1.5s ease-in-out infinite 0.4s"/>
    </g>
    <g style="animation: slideDown 2s ease-in-out infinite 0.4s">
      <rect x="270" y="75" width="70" height="250" rx="10" fill="none" stroke="white" stroke-width="10" opacity="0.8"/>
      <rect x="270" y="90" width="70" height="50" fill="white" opacity="0.6" style="animation: pulse 1.5s ease-in-out infinite 0.2s"/>
    </g>
    <circle cx="200" cy="340" r="30" fill="white" opacity="0.9" style="animation: bounce 1s ease-in-out infinite"/>
  </g>
  <style>
    @keyframes slideDown { 0%, 100% { transform: translateY(-15px); } 50% { transform: translateY(15px); } }
    @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    @keyframes bounce { 0%, 100% { cy: 340; } 50% { cy: 310; } }
  </style>
</svg>
