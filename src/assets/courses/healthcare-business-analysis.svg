<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 80 80"
  fill="none"
  aria-hidden="true"
>
  <defs>
    <filter id="pmGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#pmGlow)">
    <rect
      x="18"
      y="18"
      width="44"
      height="44"
      rx="6"
      stroke="#FFFFFF"
      stroke-width="3"
      opacity="0.85"
    />

    <line x1="26" y1="30" x2="54" y2="30" stroke="#FFFFFF" stroke-width="2" />
    <line x1="26" y1="40" x2="54" y2="40" stroke="#FFFFFF" stroke-width="2" />
    <line x1="26" y1="50" x2="54" y2="50" stroke="#FFFFFF" stroke-width="2" />

    <polyline
      points="22,30 25,33 30,26"
      stroke="#FFFFFF"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-dasharray="20"
      stroke-dashoffset="20"
    >
      <animate
        attributeName="stroke-dashoffset"
        values="20;0;20"
        dur="2s"
        repeatCount="indefinite"
      />
    </polyline>

    <circle cx="30" cy="65" r="3" fill="#FFFFFF" opacity="0.9">
      <animate
        attributeName="opacity"
        values="0.35;1;0.35"
        dur="1.2s"
        repeatCount="indefinite"
      />
    </circle>

    <circle cx="40" cy="65" r="3" fill="#FFFFFF" opacity="0.7">
      <animate
        attributeName="opacity"
        values="0.25;0.9;0.25"
        dur="1.2s"
        begin="0.15s"
        repeatCount="indefinite"
      />
    </circle>

    <circle cx="50" cy="65" r="3" fill="#FFFFFF" opacity="0.85">
      <animate
        attributeName="opacity"
        values="0.3;1;0.3"
        dur="1.2s"
        begin="0.3s"
        repeatCount="indefinite"
      />
    </circle>

    <g opacity="0.8">
      <path d="M55 20 L65 30" stroke="#FFFFFF" stroke-width="2">
        <animate
          attributeName="opacity"
          values="0.35;1;0.35"
          dur="1.8s"
          repeatCount="indefinite"
        />
      </path>
      <polygon points="65,30 62,27 68,28" fill="#FFFFFF">
        <animate
          attributeName="opacity"
          values="0.35;1;0.35"
          dur="1.8s"
          repeatCount="indefinite"
        />
      </polygon>
    </g>
  </g>
</svg>
