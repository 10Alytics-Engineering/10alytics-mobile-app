<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="productDesignGlow"><feGaussianBlur stdDeviation="8" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g filter="url(#productDesignGlow)">
    <rect x="100" y="75" width="140" height="250" rx="20" fill="none" stroke="white" stroke-width="12" opacity="0.9"/>
    <rect x="115" y="100" width="110" height="190" rx="10" fill="white" opacity="0.15"/>
    <circle cx="170" cy="140" r="30" fill="white" opacity="0.8" style="animation: float 2s ease-in-out infinite"/>
    <rect x="125" y="180" width="90" height="15" rx="5" fill="white" opacity="0.7" style="animation: fadeInOut 1.5s ease-in-out infinite"/>
    <rect x="125" y="205" width="75" height="10" rx="5" fill="white" opacity="0.6" style="animation: fadeInOut 1.5s ease-in-out infinite 0.3s"/>
    <rect x="125" y="225" width="60" height="10" rx="5" fill="white" opacity="0.5" style="animation: fadeInOut 1.5s ease-in-out infinite 0.6s"/>
    <circle cx="275" cy="175" r="30" fill="white" opacity="0.9" style="animation: pulse 1.5s ease-in-out infinite"/>
    <path d="M275 175 L300 200 L275 225" stroke="white" stroke-width="8" fill="none" opacity="0.7" style="animation: moveRight 2s ease-in-out infinite"/>
    <g opacity="0.4">
      <line x1="260" y1="100" x2="360" y2="100" stroke="white" stroke-width="5"/>
      <line x1="260" y1="135" x2="360" y2="135" stroke="white" stroke-width="5"/>
      <line x1="260" y1="170" x2="360" y2="170" stroke="white" stroke-width="5"/>
      <line x1="260" y1="205" x2="360" y2="205" stroke="white" stroke-width="5"/>
      <line x1="260" y1="240" x2="360" y2="240" stroke="white" stroke-width="5"/>
    </g>
  </g>
  <style>
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    @keyframes fadeInOut { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    @keyframes pulse { 0%, 100% { r: 30; } 50% { r: 35; } }
    @keyframes moveRight { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(20px); } }
  </style>
</svg>
