<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="dataEngineeringGlow"><feGaussianBlur stdDeviation="8" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g filter="url(#dataEngineeringGlow)">
    <g style="animation: rotate 8s linear infinite">
      <circle cx="140" cy="175" r="60" fill="none" stroke="white" stroke-width="12" opacity="0.85"/>
      <circle cx="140" cy="175" r="30" fill="white" opacity="0.4"/>
      <line x1="140" y1="100" x2="140" y2="75" stroke="white" stroke-width="10" opacity="0.8"/>
      <line x1="140" y1="250" x2="140" y2="275" stroke="white" stroke-width="10" opacity="0.8"/>
      <line x1="65" y1="175" x2="40" y2="175" stroke="white" stroke-width="10" opacity="0.8"/>
      <line x1="215" y1="175" x2="240" y2="175" stroke="white" stroke-width="10" opacity="0.8"/>
    </g>
    <g style="animation: rotate 6s linear infinite reverse">
      <circle cx="260" cy="175" r="50" fill="none" stroke="white" stroke-width="12" opacity="0.85"/>
      <circle cx="260" cy="175" r="25" fill="white" opacity="0.4"/>
      <line x1="260" y1="110" x2="260" y2="90" stroke="white" stroke-width="10" opacity="0.8"/>
      <line x1="260" y1="240" x2="260" y2="260" stroke="white" stroke-width="10" opacity="0.8"/>
      <line x1="205" y1="175" x2="185" y2="175" stroke="white" stroke-width="10" opacity="0.8"/>
      <line x1="315" y1="175" x2="335" y2="175" stroke="white" stroke-width="10" opacity="0.8"/>
    </g>
    <path d="M100 300 Q200 275 300 300" stroke="white" stroke-width="10" fill="none" opacity="0.7" style="animation: flow 2s ease-in-out infinite"/>
    <circle cx="125" cy="300" r="10" fill="white" style="animation: flowDot 2s ease-in-out infinite"/>
  </g>
  <style>
    @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes flow { 0%, 100% { stroke-dashoffset: 100; } 50% { stroke-dashoffset: 0; } }
    @keyframes flowDot { 0%, 100% { cx: 125; } 50% { cx: 275; } }
  </style>
</svg>
