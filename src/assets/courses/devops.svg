<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="devopsGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#devopsGlow)">
    <path d="M20 45 Q15 45 15 40 Q15 32 22 32 Q24 20 35 20 Q48 20 50 32 Q60 32 60 40 Q60 45 55 45 Z" fill="white" opacity="0.15" style="animation: devopsPulse 1.8s ease-in-out infinite"/>
    <path d="M20 45 Q15 45 15 40 Q15 32 22 32 Q24 20 35 20 Q48 20 50 32 Q60 32 60 40 Q60 45 55 45 Z" fill="none" stroke="white" stroke-width="2.5" opacity="0.8"/>

    <rect x="18" y="35" width="18" height="14" rx="2" fill="white" opacity="0.7" style="animation: devopsBounce 1.4s ease-in-out infinite; animation-delay: 0s; transform-box: fill-box; transform-origin: center"/>
    <rect x="20" y="37" width="14" height="2" rx="0.5" fill="white" opacity="0.5"/>
    <rect x="20" y="40" width="14" height="2" rx="0.5" fill="white" opacity="0.5"/>
    <rect x="20" y="43" width="14" height="2" rx="0.5" fill="white" opacity="0.5"/>

    <rect x="44" y="35" width="18" height="14" rx="2" fill="white" opacity="0.65" style="animation: devopsBounce 1.4s ease-in-out infinite; animation-delay: 0.2s; transform-box: fill-box; transform-origin: center"/>
    <rect x="46" y="37" width="14" height="2" rx="0.5" fill="white" opacity="0.5"/>
    <rect x="46" y="40" width="14" height="2" rx="0.5" fill="white" opacity="0.5"/>
    <rect x="46" y="43" width="14" height="2" rx="0.5" fill="white" opacity="0.5"/>

    <line x1="36" y1="42" x2="44" y2="42" stroke="white" stroke-width="1.5" opacity="0.6" style="animation: devopsPulse 1.6s ease-in-out infinite"/>
    <circle cx="40" cy="42" r="2" fill="white" opacity="0.8" style="animation: devopsBounce 1.2s ease-in-out infinite; animation-delay: 0.1s; transform-box: fill-box; transform-origin: center"/>

    <path d="M50 50 L60 60" stroke="white" stroke-width="2.5" opacity="0.85" style="animation: devopsPulse 1.5s ease-in-out infinite; animation-delay: 0s"/>
    <polygon points="60,60 57,57 63,59" fill="white" opacity="0.9"/>

    <path d="M30 50 L20 60" stroke="white" stroke-width="2.5" opacity="0.8" style="animation: devopsPulse 1.5s ease-in-out infinite; animation-delay: 0.2s"/>
    <polygon points="20,60 23,57 17,59" fill="white" opacity="0.9"/>

    <circle cx="25" cy="70" r="3" fill="white" opacity="0.9" style="animation: devopsPulse 1.4s ease-in-out infinite; animation-delay: 0s"/>
    <circle cx="40" cy="72" r="3" fill="white" opacity="0.75" style="animation: devopsPulse 1.4s ease-in-out infinite; animation-delay: 0.15s"/>
    <circle cx="55" cy="70" r="3" fill="white" opacity="0.85" style="animation: devopsPulse 1.4s ease-in-out infinite; animation-delay: 0.3s"/>

    <path d="M25 70 L40 72 L55 70" stroke="white" stroke-width="1" opacity="0.4" fill="none"/>
  </g>

  <style>
    @keyframes devopsPulse {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 1; }
    }
    @keyframes devopsBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-1.8px); }
    }
  </style>
</svg>
