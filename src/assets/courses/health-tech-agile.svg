<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 80 80"
  fill="none"
  aria-hidden="true"
>
  <defs>
    <filter id="healthAgileGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#healthAgileGlow)">
    <rect x="36" y="18" width="8" height="24" rx="2" fill="#FFFFFF" opacity="0.85" />
    <rect x="28" y="26" width="24" height="8" rx="2" fill="#FFFFFF" opacity="0.85" />

    <g opacity="0.7">
      <path d="M22 50 A18 18 0 0 1 40 65" stroke="#FFFFFF" stroke-width="2.5">
        <animate
          attributeName="opacity"
          values="0.3;1;0.3"
          dur="1.8s"
          repeatCount="indefinite"
        />
      </path>
      <polygon points="40,65 37,61 44,62" fill="#FFFFFF" opacity="0.8">
        <animate
          attributeName="opacity"
          values="0.35;1;0.35"
          dur="1.8s"
          repeatCount="indefinite"
        />
      </polygon>
    </g>

    <g opacity="0.7">
      <path d="M58 50 A18 18 0 0 1 40 65" stroke="#FFFFFF" stroke-width="2.5">
        <animate
          attributeName="opacity"
          values="0.3;1;0.3"
          dur="1.8s"
          begin="0.2s"
          repeatCount="indefinite"
        />
      </path>
      <polygon points="40,65 43,61 36,62" fill="#FFFFFF" opacity="0.8">
        <animate
          attributeName="opacity"
          values="0.35;1;0.35"
          dur="1.8s"
          begin="0.2s"
          repeatCount="indefinite"
        />
      </polygon>
    </g>

    <rect x="20" y="48" width="10" height="8" rx="2" fill="#FFFFFF" opacity="0.7">
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0 0;0 -2.5;0 0"
        dur="1.2s"
        repeatCount="indefinite"
      />
    </rect>
    <rect x="35" y="48" width="10" height="8" rx="2" fill="#FFFFFF" opacity="0.8">
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0 0;0 -2.5;0 0"
        dur="1.2s"
        begin="0.1s"
        repeatCount="indefinite"
      />
    </rect>
    <rect x="50" y="48" width="10" height="8" rx="2" fill="#FFFFFF" opacity="0.75">
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0 0;0 -2.5;0 0"
        dur="1.2s"
        begin="0.2s"
        repeatCount="indefinite"
      />
    </rect>

    <circle cx="28" cy="68" r="2.5" fill="#FFFFFF" opacity="0.9">
      <animate
        attributeName="opacity"
        values="0.35;1;0.35"
        dur="1.2s"
        repeatCount="indefinite"
      />
    </circle>
    <circle cx="40" cy="70" r="2.5" fill="#FFFFFF" opacity="0.7">
      <animate
        attributeName="opacity"
        values="0.25;0.9;0.25"
        dur="1.2s"
        begin="0.15s"
        repeatCount="indefinite"
      />
    </circle>
    <circle cx="52" cy="68" r="2.5" fill="#FFFFFF" opacity="0.85">
      <animate
        attributeName="opacity"
        values="0.3;1;0.3"
        dur="1.2s"
        begin="0.3s"
        repeatCount="indefinite"
      />
    </circle>
  </g>
</svg>
