<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="businessAnalysisGlow"><feGaussianBlur stdDeviation="8" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g filter="url(#businessAnalysisGlow)">
    <rect x="100" y="75" width="200" height="250" rx="20" fill="none" stroke="white" stroke-width="12" opacity="0.6"/>
    <rect x="100" y="75" width="200" height="40" fill="white" opacity="0.4"/>
    <line x1="125" y1="140" x2="275" y2="140" stroke="white" stroke-width="10" opacity="0.8" style="animation: slideIn 1.5s ease-in-out infinite"/>
    <line x1="125" y1="180" x2="250" y2="180" stroke="white" stroke-width="10" opacity="0.7" style="animation: slideIn 1.5s ease-in-out infinite 0.3s"/>
    <line x1="125" y1="220" x2="240" y2="220" stroke="white" stroke-width="10" opacity="0.6" style="animation: slideIn 1.5s ease-in-out infinite 0.6s"/>
    <line x1="125" y1="260" x2="260" y2="260" stroke="white" stroke-width="10" opacity="0.7" style="animation: slideIn 1.5s ease-in-out infinite 0.9s"/>
    <circle cx="325" cy="125" r="40" fill="white" opacity="0.9" style="animation: pulse 2s ease-in-out infinite"/>
    <path d="M310 125 L320 135 L335 115" stroke="white" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.8" style="animation: bounce 1s ease-in-out infinite 0.5s"/>
  </g>
  <style>
    @keyframes slideIn { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    @keyframes pulse { 0%, 100% { r: 40; } 50% { r: 45; } }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
  </style>
</svg>
