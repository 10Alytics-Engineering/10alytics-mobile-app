<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cybersecurityGlow"><feGaussianBlur stdDeviation="8" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g filter="url(#cybersecurityGlow)">
    <path d="M200 75 L300 125 L300 200 Q300 275 200 325 Q100 275 100 200 L100 125 Z" fill="none" stroke="white" stroke-width="12" opacity="0.9"/>
    <rect x="160" y="175" width="80" height="90" rx="10" fill="white" opacity="0.7" style="animation: pulse 2s ease-in-out infinite"/>
    <path d="M200 175 Q225 175 225 150 Q225 130 200 130 Q175 130 175 150 Q175 175 200 175" fill="none" stroke="white" stroke-width="10" opacity="0.85" style="animation: rotate 4s linear infinite"/>
    <line x1="125" y1="100" x2="275" y2="100" stroke="white" stroke-width="8" opacity="0.5" style="animation: scan 3s ease-in-out infinite"/>
    <line x1="125" y1="350" x2="275" y2="350" stroke="white" stroke-width="8" opacity="0.5" style="animation: scan 3s ease-in-out infinite 1s"/>
  </g>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.85; } }
    @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes scan { 0%, 100% { y: 100; } 50% { y: 350; } }
  </style>
</svg>
